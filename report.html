<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Page</title>
    <link rel="stylesheet" href="css/report.css">
</head>

<body>

    <!-- 🔹 Navbar -->
    <nav class="navbar_">
        <a href="index.html" class="logo">CineCritic</a>
        <div class="nav_links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
        </div>
    </nav>

    <!-- 🔹 Main Content -->
    <div class="main-content">

        <div class="report-container">
            <h1>Submit a Report</h1>

            <form id="reportForm">

                <div class="form-group">
                    <label for="reportTitle">Report Title</label>
                    <input type="text" id="reportTitle" name="reportTitle" placeholder="Enter report title" required
                        minlength="3">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="">Select category</option>
                        <option value="bug">Bug</option>
                        <option value="feedback">Feedback</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="details">Report Details</label>
                    <textarea id="details" name="details" placeholder="Write your report here..." required
                        minlength="10"></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    Submit Report
                </button>

            </form>
        </div>
    </div>
    <div id="toast"></div>
    <script src="js/report.js"></script>

</body>

</html>
